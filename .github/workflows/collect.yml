name: 定时收集公益广告

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 央视作品库收集
        run: python scripts/collect_cntv.py

      - name: 安装 yt-dlp
        run: pip install yt-dlp

      - name: B站搜索收集
        env:
          COLLECT_LIMIT: '10'
        run: python scripts/collect.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "chore: 更新公益广告索引 [$(date -u +%Y-%m-%d)]"
          git push
